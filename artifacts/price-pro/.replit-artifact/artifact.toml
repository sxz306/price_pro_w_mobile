kind = "web"
previewPath = "/"
title = "Price Pro"
version = "1.0.0"
id = "artifacts/price-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23054

[services.development]
run = "pnpm --filter @workspace/price-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/price-pro", "run", "build" ]
publicDir = "artifacts/price-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23054"
BASE_PATH = "/"
